<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – NorskHockey.no</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ice: #a8d8f0;
            --ice-bright: #d4f1ff;
            --rink: #03111f;
            --rink-mid: #071e30;
            --rink-light: #0d2d45;
            --gold: #f0c040;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--rink);
            color: #e8f4fd;
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Barlow Condensed', sans-serif; }

        .ice-bg {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(168, 216, 240, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 216, 240, 0.06) 0%, transparent 50%),
                var(--rink);
        }

        nav {
            background: rgba(3, 17, 31, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(168, 216, 240, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 1.6rem;
            letter-spacing: 0.05em;
            color: var(--ice-bright);
            text-transform: uppercase;
            text-decoration: none;
        }

        .nav-logo span { color: var(--ice); opacity: 0.6; }

        .nav-link {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(168, 216, 240, 0.7);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link:hover { color: var(--ice-bright); background: rgba(168, 216, 240, 0.1); }

        /* INNLOGGING */
        .login-boks {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--rink-mid);
            border: 1px solid rgba(168, 216, 240, 0.1);
            border-radius: 12px;
            padding: 2rem;
        }

        .login-tittel {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            text-transform: uppercase;
            color: var(--ice-bright);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* FORM ELEMENTER */
        .form-gruppe {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(168, 216, 240, 0.5);
            margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            background: rgba(168, 216, 240, 0.06);
            border: 1px solid rgba(168, 216, 240, 0.12);
            border-radius: 6px;
            padding: 0.65rem 1rem;
            color: var(--ice-bright);
            font-family: 'Barlow', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input::placeholder { color: rgba(168, 216, 240, 0.25); }
        .form-input:focus { border-color: rgba(168, 216, 240, 0.3); }

        /* KNAPPER */
        .btn-primary {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.7rem 2rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(168, 216, 240, 0.15);
            color: var(--ice-bright);
            border: 1px solid rgba(168, 216, 240, 0.25);
        }

        .btn-primary:hover {
            background: rgba(168, 216, 240, 0.25);
            border-color: rgba(168, 216, 240, 0.4);
        }

        .btn-danger {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(192, 57, 43, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(192, 57, 43, 0.3);
        }

        .btn-danger:hover {
            background: rgba(192, 57, 43, 0.25);
        }

        .btn-secondary {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: rgba(168, 216, 240, 0.5);
            border: 1px solid rgba(168, 216, 240, 0.15);
        }

        .btn-secondary:hover {
            color: var(--ice-bright);
            border-color: rgba(168, 216, 240, 0.3);
        }

        /* ADMIN LAYOUT */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ice-bright);
            border-left: 3px solid var(--ice);
            padding-left: 0.7rem;
            margin-bottom: 1.2rem;
        }

        /* ARTIKKEL LISTE I ADMIN */
        .admin-artikkel {
            background: var(--rink-mid);
            border: 1px solid rgba(168, 216, 240, 0.08);
            border-radius: 8px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-artikkel-tittel {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--ice-bright);
            flex: 1;
        }

        .admin-artikkel-dato {
            font-size: 0.72rem;
            color: rgba(168, 216, 240, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
        }

        .status-publisert {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-utkast {
            background: rgba(168, 216, 240, 0.08);
            color: rgba(168, 216, 240, 0.4);
            border: 1px solid rgba(168, 216, 240, 0.1);
        }

        /* MELDING */
        .melding {
            padding: 0.8rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .melding-suksess {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .melding-feil {
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid rgba(192, 57, 43, 0.2);
            color: #e74c3c;
        }

        /* BILDE OPPLASTING */
        .bilde-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 0.5rem;
            border: 1px solid rgba(168, 216, 240, 0.12);
        }

        .bilde-knapp {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(168, 216, 240, 0.08);
            color: rgba(168, 216, 240, 0.6);
            border: 1px dashed rgba(168, 216, 240, 0.2);
            width: 100%;
            text-align: center;
        }

        .bilde-knapp:hover {
            background: rgba(168, 216, 240, 0.12);
            color: var(--ice);
            border-color: rgba(168, 216, 240, 0.3);
        }

        #bilde-input { display: none; }

        footer {
            border-top: 1px solid rgba(168, 216, 240, 0.08);
            padding: 2rem 0;
            color: rgba(168, 216, 240, 0.25);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 4rem;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--rink); }
        ::-webkit-scrollbar-thumb { background: rgba(168, 216, 240, 0.2); border-radius: 3px; }
    </style>
</head>
<body class="ice-bg">

    <nav>
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 56px;">
            <a href="index.html" class="nav-logo">NorskHockey<span>.no</span></a>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <a href="index.html" class="nav-link">← Tilbake til siden</a>
            </div>
        </div>
    </nav>

    <div style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 4rem;" x-data="adminData()">

        <!-- INNLOGGING -->
        <div x-show="!loggetInn">
            <div class="login-boks">
                <div class="login-tittel">🔒 Admin</div>
                <div class="form-gruppe">
                    <label class="form-label">Passord</label>
                    <input
                        class="form-input"
                        type="password"
                        placeholder="Skriv inn passord"
                        x-model="passordInput"
                        @keyup.enter="loggInn()"
                    >
                </div>
                <div x-show="feilPassord" class="melding melding-feil">Feil passord</div>
                <button class="btn-primary" style="width: 100%" @click="loggInn()">Logg inn</button>
            </div>
        </div>

        <!-- ADMIN PANEL -->
        <div x-show="loggetInn" style="padding-top: 2rem;">

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-family: Barlow Condensed; font-weight: 900; font-size: 2rem; text-transform: uppercase; color: var(--ice-bright);">
                    Admin Panel
                </h1>
                <button class="btn-secondary" @click="loggetInn = false">Logg ut</button>
            </div>

            <div x-show="melding" class="melding" :class="meldingType === 'suksess' ? 'melding-suksess' : 'melding-feil'" x-text="melding"></div>

            <div class="admin-grid">

                <!-- VENSTRE: REDAKTØR -->
                <div>
                    <h2 class="section-title" x-text="redigerer ? 'Rediger artikkel' : 'Ny artikkel'"></h2>

                    <div class="form-gruppe">
                        <label class="form-label">Tittel</label>
                        <input class="form-input" type="text" placeholder="Artikkelens tittel" x-model="form.title">
                    </div>

                    <div class="form-gruppe">
                        <label class="form-label">Forfatter</label>
                        <input class="form-input" type="text" placeholder="Navn på forfatter" x-model="form.author">
                    </div>

                    <div class="form-gruppe">
                        <label class="form-label">Innhold</label>
                        <div id="quill-editor" style="height: 300px; background: rgba(168,216,240,0.06); border: 1px solid rgba(168,216,240,0.12); border-radius: 6px; color: var(--ice-bright);"></div>
                        <div style="margin-top: 0.5rem;">
                            <label for="tekst-bilde-input" class="bilde-knapp" style="font-size: 0.75rem;">
                                📷 Sett inn bilde i tekst
                            </label>
                            <input type="file" id="tekst-bilde-input" accept="image/*" @change="settInnBilde($event)">
                        </div>
                    </div>

                    <div style="display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap;">
                        <button class="btn-primary" @click="lagreArtikkel(0)">Lagre utkast</button>
                        <button class="btn-primary" style="background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.3); color: #2ecc71;" @click="lagreArtikkel(1)">Publiser</button>
                        <button class="btn-secondary" x-show="redigerer" @click="nullstillForm()">Avbryt</button>
                    </div>
                </div>

                <!-- HØYRE: BILDE + ARTIKKELLISTE -->
                <div>
                    <!-- BILDE OPPLASTING -->
                    <h2 class="section-title" style="margin-bottom: 1rem;">Bilde</h2>
                    <div class="form-gruppe">
                        <label for="bilde-input" class="bilde-knapp">
                            📷 Last opp bilde
                        </label>
                        <input type="file" id="bilde-input" accept="image/*" @change="lastOppBilde($event)">
                        <div x-show="lasterBilde" style="text-align: center; padding: 1rem; color: rgba(168,216,240,0.4); font-size: 0.8rem;">Laster opp...</div>
                        <img x-show="form.image_url" :src="form.image_url" class="bilde-preview">
                        <button x-show="form.image_url" class="btn-secondary" style="margin-top: 0.5rem; width: 100%;" @click="form.image_url = null">Fjern bilde</button>
                    </div>

                    <!-- ARTIKKELLISTE -->
                    <h2 class="section-title" style="margin-top: 2rem;">Publiserte artikler</h2>
                    <div x-show="alleArtikler.length === 0" style="color: rgba(168,216,240,0.3); font-size: 0.85rem; padding: 1rem 0;">
                        Ingen artikler ennå
                    </div>
                    <template x-for="artikkel in alleArtikler" :key="artikkel.id">
                        <div class="admin-artikkel">
                            <div style="flex: 1; min-width: 0;">
                                <div class="admin-artikkel-tittel" x-text="artikkel.title"></div>
                                <div class="admin-artikkel-dato" x-text="formaterDato(artikkel.created_at)"></div>
                            </div>
                            <span class="status-badge" :class="artikkel.published ? 'status-publisert' : 'status-utkast'" x-text="artikkel.published ? 'Publisert' : 'Utkast'"></span>
                            <button class="btn-secondary" @click="rediger(artikkel)" style="padding: 0.3rem 0.7rem;">✏️</button>
                            <button class="btn-danger" @click="slettArtikkel(artikkel.id)">🗑</button>
                        </div>
                    </template>
                </div>

            </div>
        </div>
    </div>

    <footer>
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between;">
            <span>NorskHockey.no – Admin</span>
            <span>Frostwake Studio</span>
        </div>
    </footer>

    <script>
        const API = 'https://web-production-3e3870.up.railway.app';
        let editor = null;

        function adminData() {
            return {
                loggetInn: false,
                passordInput: '',
                feilPassord: false,
                passord: '',
                melding: '',
                meldingType: 'suksess',
                alleArtikler: [],
                lasterBilde: false,
                redigerer: null,
                form: {
                    title: '',
                    content: '',
                    author: 'Redaksjonen',
                    image_url: null,
                    published: 0
                },

                async init() {
                    // Init Quill
                    setTimeout(() => {
                        editor = new Quill('#quill-editor', {
                            theme: 'snow',
                            modules: {
                                toolbar: [
                                    ['bold', 'italic', 'underline'],
                                    [{ 'header': [2, 3, false] }],
                                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                    ['link', 'image'],
                                    ['clean']
                                ]
                            }
                        });
                        editor.on('text-change', () => {
                            this.form.content = editor.root.innerHTML;
                        });
                    }, 500);
                },

                loggInn() {
                    this.passord = this.passordInput;
                    this.feilPassord = false;
                    // Test passord ved å hente artikler
                    this.loggetInn = true;
                    this.hentArtikler();
                },

                async hentArtikler() {
                    try {
                        const res = await fetch(`${API}/admin/artikler/alle?passord=${this.passord}`);
                        if (res.status === 401) {
                            this.loggetInn = false;
                            this.feilPassord = true;
                            return;
                        }
                        this.alleArtikler = await res.json();
                    } catch(e) {
                        console.error(e);
                    }
                },

                async lagreArtikkel(publisert) {
                    if (!this.form.title) {
                        this.visMelding('Tittel er påkrevd', 'feil');
                        return;
                    }

                    const artikkel = { ...this.form, published: publisert };
                    const url = this.redigerer
                        ? `${API}/admin/artikler/${this.redigerer}?passord=${this.passord}`
                        : `${API}/admin/artikler?passord=${this.passord}`;
                    const metode = this.redigerer ? 'PUT' : 'POST';

                    try {
                        const res = await fetch(url, {
                            method: metode,
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(artikkel)
                        });

                        if (res.ok) {
                            this.visMelding(publisert ? 'Artikkel publisert!' : 'Utkast lagret!', 'suksess');
                            this.nullstillForm();
                            await this.hentArtikler();
                        }
                    } catch(e) {
                        this.visMelding('Noe gikk galt', 'feil');
                    }
                },

                async slettArtikkel(id) {
                    if (!confirm('Er du sikker på at du vil slette denne artikkelen?')) return;
                    try {
                        await fetch(`${API}/admin/artikler/${id}?passord=${this.passord}`, { method: 'DELETE' });
                        this.visMelding('Artikkel slettet', 'suksess');
                        await this.hentArtikler();
                    } catch(e) {
                        this.visMelding('Kunne ikke slette', 'feil');
                    }
                },

                rediger(artikkel) {
                    this.redigerer = artikkel.id;
                    this.form = {
                        title: artikkel.title,
                        content: artikkel.content,
                        author: artikkel.author,
                        image_url: artikkel.image_url,
                        published: artikkel.published
                    };
                    if (editor) editor.clipboard.dangerouslyPasteHTML(artikkel.content);
                    window.scrollTo(0, 0);
                },

                nullstillForm() {
                    this.redigerer = null;
                    this.form = { title: '', content: '', author: 'Redaksjonen', image_url: null, published: 0 };
                    if (editor) editor.setContents([]);
                },

                async settInnBilde(event) {
                    const fil = event.target.files[0];
                    if (!fil) return;

                    const formData = new FormData();
                    formData.append('fil', fil);

                    try {
                        const res = await fetch(`${API}/admin/last-opp-bilde?passord=${this.passord}`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        const range = editor.getSelection(true);
                        editor.insertEmbed(range.index, 'image', data.url);
                        editor.setSelection(range.index + 1);
                        event.target.value = '';
                    } catch(e) {
                        this.visMelding('Bildeopplasting feilet', 'feil');
                    }
                },

                async lastOppBilde(event) {
                    const fil = event.target.files[0];
                    if (!fil) return;

                    this.lasterBilde = true;
                    const formData = new FormData();
                    formData.append('fil', fil);

                    try {
                        const res = await fetch(`${API}/admin/last-opp-bilde?passord=${this.passord}`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        this.form.image_url = data.url;
                    } catch(e) {
                        this.visMelding('Bildeopplasting feilet', 'feil');
                    } finally {
                        this.lasterBilde = false;
                    }
                },

                visMelding(tekst, type) {
                    this.melding = tekst;
                    this.meldingType = type;
                    setTimeout(() => { this.melding = ''; }, 4000);
                },

                formaterDato(isoString) {
                    if (!isoString) return '';
                    return new Date(isoString).toLocaleDateString('no-NO', {
                        day: 'numeric', month: 'long', year: 'numeric'
                    });
                }
            }
        }
    </script>

</body>
</html>
